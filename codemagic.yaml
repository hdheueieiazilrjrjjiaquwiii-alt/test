workflows:
  expo-android-apk:
    name: Expo Android APK
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - npm install -g expo-cli
      - npm install
      - npx expo install
      - npx expo prebuild --platform android
      - cd android
      - ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
